services:
  urlslim:
    build: .
    container_name: urlslim
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=data/links.db
      - BASE_URL=http://localhost:3000
      - CACHE_CAPACITY=10000
      - RATE_LIMIT_REQUESTS=10000
      - RATE_LIMIT_WINDOW_SECS=60
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10

  vegeta:
    image: peterevans/vegeta:latest
    container_name: vegeta
    depends_on:
      urlslim:
        condition: service_healthy
    volumes:
      - ./benchmark_results:/results
    entrypoint: |
      sh -c "
        echo 'GET http://urlslim:3000/test' | vegeta attack -duration=30s -rate=5000 | vegeta report -type=text | tee /results/benchmark.txt &&
        echo 'GET http://urlslim:3000/test' | vegeta attack -duration=30s -rate=5000 | vegeta plot > /results/plot.html
      "
    profiles:
      - benchmark

  hey:
    image: williamyeh/hey:latest
    container_name: hey
    depends_on:
      urlslim:
        condition: service_healthy
    entrypoint: hey -z 30s -q 5000 -c 200 http://urlslim:3000/test
    profiles:
      - benchmark
